<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <meta name="theme-color" content="#0d0d0f" />
    <!-- Aplica el tema antes de pintar para evitar el parpadeo (FOUC). -->
    <script>
      (function () {
        try {
          var c = localStorage.getItem('nitro_theme') || 'system'
          var sys = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
          document.documentElement.dataset.theme = c === 'system' ? sys : c
        } catch (e) {}
      })()
    </script>

    <!-- SEO principal -->
    <title>Nitro Garage | Venta de Accesorios Automotrices</title>
    <meta
      name="description"
      content="Nitro Garage — tienda de accesorios automotrices. Iluminación LED, interiores, tecnología y equipamiento para tu vehículo. Calidad y estilo para tu auto."
    />
    <meta
      name="keywords"
      content="accesorios automotrices, accesorios para autos, tapetes, luces LED, fundas de volante, cargadores, tuning, Nitro Garage"
    />
    <meta name="author" content="Nitro Garage" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://nitrogarage.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nitro Garage" />
    <meta property="og:title" content="Nitro Garage | Venta de Accesorios Automotrices" />
    <meta
      property="og:description"
      content="Accesorios automotrices con estilo: iluminación LED, interiores, tecnología y más para tu vehículo."
    />
    <meta property="og:image" content="/logo.jpg" />
    <meta property="og:url" content="https://nitrogarage.com/" />
    <meta property="og:locale" content="es_ES" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nitro Garage | Venta de Accesorios Automotrices" />
    <meta
      name="twitter:description"
      content="Accesorios automotrices con estilo para tu vehículo."
    />
    <meta name="twitter:image" content="/logo.jpg" />

    <!-- Datos estructurados (JSON-LD) para buscadores -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Nitro Garage",
        "description": "Venta de accesorios automotrices.",
        "image": "/logo.jpg",
        "url": "https://nitrogarage.com/",
        "priceRange": "$$",
        "makesOffer": {
          "@type": "OfferCatalog",
          "name": "Accesorios automotrices"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
