<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <meta name="theme-color" content="#0d0d0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f3f4f7" media="(prefers-color-scheme: light)" />
    <!-- Aplica el tema antes de pintar para evitar el parpadeo (FOUC). -->
    <script>
      (function () {
        try {
          var c = localStorage.getItem('nitro_theme') || 'system'
          var sys = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
          document.documentElement.dataset.theme = c === 'system' ? sys : c
        } catch (e) {}
      })()
    </script>

    <!-- SEO principal -->
    <title>Nitro Garage | Accesorios Off-Road y 4x4 para Pickups</title>
    <meta
      name="description"
      content="Nitro Garage — accesorios off-road y 4x4 para pickups y camionetas: roll bars, racks de batea, bumpers, tumbaburros, tapas y casetas, estribos, tool box y bedliners. Busca por marca, modelo y año. Envíos a todo México."
    />
    <meta
      name="keywords"
      content="accesorios off-road, accesorios 4x4, accesorios para pickup, roll bar, racks de batea, bumpers, tumbaburros, tapa de batea, caseta, estribos, tool box, bedliner, Toyota Hilux, Ford Ranger, Nissan Frontier, Nitro Garage"
    />
    <meta name="author" content="Nitro Garage" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="canonical" href="https://nitrogarage-mekanotek.com/" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nitro Garage" />
    <meta property="og:title" content="Nitro Garage | Accesorios Off-Road y 4x4 para Pickups" />
    <meta
      property="og:description"
      content="Accesorios off-road y 4x4 para pickups: roll bars, racks, bumpers, tapas, estribos y más. Busca por marca, modelo y año."
    />
    <meta property="og:image" content="https://nitrogarage-mekanotek.com/logo.jpg" />
    <meta property="og:image:width" content="1600" />
    <meta property="og:image:height" content="870" />
    <meta property="og:image:alt" content="Nitro Garage — accesorios off-road y 4x4" />
    <meta property="og:url" content="https://nitrogarage-mekanotek.com/" />
    <meta property="og:locale" content="es_MX" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nitro Garage | Accesorios Off-Road y 4x4 para Pickups" />
    <meta
      name="twitter:description"
      content="Accesorios off-road y 4x4 para pickups: roll bars, racks, bumpers, tapas, estribos y más."
    />
    <meta name="twitter:image" content="https://nitrogarage-mekanotek.com/logo.jpg" />
    <meta name="twitter:image:alt" content="Nitro Garage — accesorios off-road y 4x4" />

    <!-- Datos estructurados (JSON-LD) para buscadores -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Store",
            "@id": "https://nitrogarage-mekanotek.com/#store",
            "name": "Nitro Garage",
            "description": "Venta de accesorios off-road y 4x4 para pickups y camionetas: roll bars, racks, bumpers, tapas, estribos, tool box y bedliners.",
            "image": "https://nitrogarage-mekanotek.com/logo.jpg",
            "logo": "https://nitrogarage-mekanotek.com/logo.jpg",
            "url": "https://nitrogarage-mekanotek.com/",
            "telephone": "+52 238 290 0385",
            "email": "contacto@nitrogarage.com",
            "priceRange": "$$",
            "areaServed": { "@type": "Country", "name": "México" },
            "makesOffer": {
              "@type": "OfferCatalog",
              "name": "Accesorios off-road y 4x4"
            }
          },
          {
            "@type": "WebSite",
            "@id": "https://nitrogarage-mekanotek.com/#website",
            "url": "https://nitrogarage-mekanotek.com/",
            "name": "Nitro Garage",
            "inLanguage": "es-MX",
            "potentialAction": {
              "@type": "SearchAction",
              "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://nitrogarage-mekanotek.com/catalogo?q={search_term_string}"
              },
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
